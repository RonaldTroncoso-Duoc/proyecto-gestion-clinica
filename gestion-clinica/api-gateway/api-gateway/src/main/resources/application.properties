spring.cloud.gateway.routes[9].filters[0]=AuthenticationFilter

# ==============================================================
# RUTAS SWAGGER (10 rutas) - SIN AuthenticationFilter
# RewritePath usa sintaxis expandida para .properties
# (la coma en properties es separador de lista, no funciona
#  la sintaxis compacta RewritePath=/path, /dest)
# ==============================================================

# Ruta 10 - ms-auth
spring.cloud.gateway.routes[10].id=swagger-ms-auth
spring.cloud.gateway.routes[10].uri=lb://ms-auth
spring.cloud.gateway.routes[10].predicates[0]=Path=/ms-auth/v3/api-docs
spring.cloud.gateway.routes[10].filters[0].name=RewritePath
spring.cloud.gateway.routes[10].filters[0].args.regexp=/ms-auth/v3/api-docs
spring.cloud.gateway.routes[10].filters[0].args.replacement=/v3/api-docs

