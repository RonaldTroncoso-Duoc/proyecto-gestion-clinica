server.port=8080
spring.application.name=api-gateway

# ==============================================================
# CORS GLOBAL - Permite Swagger UI desde cualquier origen
# ==============================================================

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ==============================================================
# RUTAS DE NEGOCIO (10 rutas)
# ==============================================================

spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=lb://ms-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=ms-citas
spring.cloud.gateway.routes[1].uri=lb://ms-citas
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/citas/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=ms-especialidades
