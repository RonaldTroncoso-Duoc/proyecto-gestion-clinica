spring.application.name=ms-notificaciones
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3307/db_notificaciones?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.example.ms_notificaciones=INFO
logging.level.example.ms_notificaciones.client=DEBUG
logging.level.org.hibernate.SQL=DEBUG

spring.sql.init.mode=never