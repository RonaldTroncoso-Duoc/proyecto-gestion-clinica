  ms-pagos:
    image: eclipse-temurin:21-jre
    container_name: gestion-clinica-ms-pagos
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      ms-citas:
        condition: service_started
    volumes:
      - ./apps/ms-pagos.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8089:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_PAGOS}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
