  # ============================================================
  # Entrada principal - API Gateway
  # ============================================================
  api-gateway:
    image: eclipse-temurin:21-jre
    container_name: gestion-clinica-api-gateway
    restart: always
    depends_on:
      eureka-server:
        condition: service_started
      ms-auth:
        condition: service_started
      ms-pacientes:
        condition: service_started
      ms-medicos:
        condition: service_started
      ms-especialidades:
        condition: service_started
      ms-horarios:
        condition: service_started
      ms-citas:
        condition: service_started
      ms-fichas-clinicas:
        condition: service_started
      ms-recetas:
        condition: service_started
      ms-pagos:
        condition: service_started
      ms-notificaciones:
        condition: service_started
    volumes:
      - ./apps/api-gateway.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - gestion-clinica-net

volumes:
  mysql-data:

networks:
  gestion-clinica-net:
    driver: bridge
