server:
  port: 8081

spring:
  application:
    name: ms-auth

  datasource:
    url: jdbc:mysql://localhost:3307/db_auth?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: EstaEsUnaLlaveMuySecretaYQueDebeSerLargaParaQueFuncione12345

logging:
  level:
    root: INFO
